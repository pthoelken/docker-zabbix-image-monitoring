# =============================================================================
# /etc/zabbix/zabbix_agent2.d/docker_updates.conf
#
# Zabbix UserParameter definitions for Docker image update monitoring.
# Reload agent after placing this file:
#   systemctl restart zabbix-agent   (for agent 1)
#   systemctl restart zabbix-agent2  (for agent 2)
#
# All keys call /etc/zabbix/scripts/docker_image_check.sh
# Timeout in zabbix_agentd.conf / zabbix_agent2.conf should be >= 30
# (skopeo registry queries can take several seconds)
# =============================================================================

# Check if Docker daemon is running (returns 1 or 0)
UserParameter=docker.daemon.status,/etc/zabbix/scripts/docker_image_check.sh daemon_status

# LLD: Discover all currently running containers (returns JSON)
UserParameter=docker.containers.discover,/etc/zabbix/scripts/docker_image_check.sh discover

# Check if an update is available for a container's image
# $1 = container name (as returned by docker ps --format '{{.Names}}')
# Returns: 0=up-to-date | 1=update-available | 2=cannot-check | 3=error
UserParameter=docker.image.update[*],/etc/zabbix/scripts/docker_image_check.sh check_update "$1"

# Get the image reference string of a container (e.g. nginx:latest)
UserParameter=docker.image.name[*],/etc/zabbix/scripts/docker_image_check.sh get_image "$1"

# Get the locally stored image digest (sha256:...) of a container
UserParameter=docker.image.digest[*],/etc/zabbix/scripts/docker_image_check.sh get_digest "$1"
